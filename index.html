<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>THD Analytics Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/tables.css">
    <link rel="stylesheet" href="css/charts.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

    <!-- ========================= -->
    <!-- Header -->
    <!-- ========================= -->

    <header class="topbar">

        <div>

            <h1>THD Analytics</h1>

            <p>Marketing Performance Dashboard</p>

        </div>

        <div class="topbar-right">

            <span id="lastUpdate">

                Last Update
                <strong>2026/07/16 10:30</strong>

            </span>

            <button class="refreshBtn">

                Refresh

            </button>

        </div>

    </header>



    <!-- ========================= -->
    <!-- Filter -->
    <!-- ========================= -->

    <section class="filterBar">

        <select>

            <option>Last 30 Days</option>

        </select>

        <select>

            <option>All Sources</option>

        </select>

        <select>

            <option>All Stores</option>

        </select>

        <button>

            Compare Previous

        </button>

    </section>



    <!-- ========================= -->
    <!-- KPI -->
    <!-- ========================= -->

    <section class="kpiGrid">

        <div class="kpiCard">

            <div class="cardTitle">

                👤 Users

            </div>

            <div class="cardValue">

                41,175

            </div>

            <div class="cardGrowth positive">

                ▲ 8.2%

            </div>

        </div>

        <div class="kpiCard">

            <div class="cardTitle">

                💴 Revenue

            </div>

            <div class="cardValue">

                ¥36,182,782

            </div>

            <div class="cardGrowth positive">

                ▲ 5.4%

            </div>

        </div>

        <div class="kpiCard">

            <div class="cardTitle">

                🛒 Orders

            </div>

            <div class="cardValue">

                3,719

            </div>

            <div class="cardGrowth negative">

                ▼ 2.1%

            </div>

        </div>

        <div class="kpiCard">

            <div class="cardTitle">

                📈 CVR

            </div>

            <div class="cardValue">

                6.03%

            </div>

            <div class="cardGrowth positive">

                ▲ 0.8%

            </div>

        </div>

    </section>



    <!-- ========================= -->
    <!-- Trend -->
    <!-- ========================= -->

    <section class="panel">

        <div class="panelHeader">

            Revenue & Users Trend

        </div>

        <canvas id="trendChart"></canvas>

    </section>



    <!-- ========================= -->
    <!-- Lower -->
    <!-- ========================= -->

    <section class="bottomGrid">

        <div class="panel">

            <div class="panelHeader">

                Traffic Sources

            </div>

        </div>

        <div class="panel">

            <div class="panelHeader">

                Insights

            </div>

        </div>

    </section>



    <!-- ========================= -->
    <!-- Table -->
    <!-- ========================= -->

    <section class="panel">

        <div class="panelHeader">

            Monthly Business Performance

        </div>

        <table class="modernTable">

            <thead>

            <tr>

                <th>Month</th>

                <th>Revenue</th>

                <th>Orders</th>

                <th>Users</th>

            </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </section>

</div>



<script src="js/charts.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
